<!DOCTYPE html>
<html>
    <head>
        <title>Student Information Form</title>
    </head>
    <body>
        <form>
            <fieldset><legend><b>Student Information</b></legend>
            <table cellpadding="10">
                <tr>
                    <td><label>Full Name(Text)</label></td>
                    <td><label>Email Address</label></td>
                </tr>
                <tr>
                    <td>
                        <input type="text" size="40">
                    </td>
                    <td>
                        <input type="email" size="40">
                    </td>
                </tr>
                <tr>
                    <td><label>password</label></td>
                    <td><label>Age</label></td>
                </tr>
                <tr>
                    <td><input type="password" size="40"></td>
                    <td><input type="age" size="40"></td>
                </tr>
                <tr><td><label>Expriment Date</label></td>
                <td><label>Phone Number</label></td></tr>
                <tr>
                    <td>
                        <input type="date">
                    </td>
                    <td>
                        <input type="tel" size="40">
                    </td>
                </tr>
                <tr>
                    <td align="center"><input type="submit" value="SUBMIT"></td>
                    <td align="center"><input type="reset" value="CLEAR"></td>
                </tr>
                
            </table></fieldset>
        </form>
    </body>
</html>
